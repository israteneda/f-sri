version: '3.8'

services:
  db:
    image: postgres:15
    container_name: factuapi_postgres_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - factuapi_network

  redis:
    image: redis:7-alpine
    container_name: factuapi_redis_prod
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - factuapi_network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: factuapi_web_prod
    command: gunicorn factuapi.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    environment:
      - DEBUG=0
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - factuapi_network

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: factuapi_celery_prod
    command: celery -A factuapi worker --loglevel=info
    volumes:
      - media_files:/app/media
    environment:
      - DEBUG=0
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - factuapi_network

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: factuapi_celery_beat_prod
    command: celery -A factuapi beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DEBUG=0
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - factuapi_network

  nginx:
    image: nginx:alpine
    container_name: factuapi_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - factuapi_network

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:

networks:
  factuapi_network:
    driver: bridge