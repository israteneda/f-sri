version: '3.8'

services:
  db:
    image: postgres:15
    container_name: factuapi_postgres
    environment:
      POSTGRES_DB: factuapi
      POSTGRES_USER: factuapi
      POSTGRES_PASSWORD: factuapi123
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - factuapi_network

  redis:
    image: redis:7-alpine
    container_name: factuapi_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - factuapi_network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: factuapi_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgresql://factuapi:factuapi123@db:5432/factuapi
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - factuapi_network

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: factuapi_celery
    command: celery -A factuapi worker --loglevel=info
    volumes:
      - .:/app
      - media_files:/app/media
    environment:
      - DEBUG=1
      - DATABASE_URL=postgresql://factuapi:factuapi123@db:5432/factuapi
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - factuapi_network

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: factuapi_celery_beat
    command: celery -A factuapi beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - DATABASE_URL=postgresql://factuapi:factuapi123@db:5432/factuapi
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - factuapi_network

  nginx:
    image: nginx:alpine
    container_name: factuapi_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      - web
    networks:
      - factuapi_network

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:

networks:
  factuapi_network:
    driver: bridge